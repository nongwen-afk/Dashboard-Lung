name: "Stage 2: Merge to Dev"

on:
  push:
    branches:
      - dev

# เตรียมดึง Secrets ทั้งหมดมารวมไว้ที่เดียวกันตรงนี้
env:
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
  DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  staging-pipeline:
    name: "Staging CI Pipeline"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        id: setup
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        id: install
        run: npm ci
        continue-on-error: true

      - name: Database Migration (Prisma on Staging)
        id: db
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_STAGING }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            npx prisma migrate deploy || echo "No prisma config found, skipping."
          else
            echo "No Staging Database URL found, skipping."
          fi

      - name: Basic Tests (Lint & Build)
        id: basic
        run: |
          npm run lint --if-present
          npm run build --if-present

      - name: Full Test Suite (Integration)
        id: integration
        run: |
          npm run test --if-present

      - name: SonarCloud Scan
        id: sonar
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true

      - name: Chromatic Baseline Update
        id: chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          autoAcceptChanges: true # อัปเดต Baseline อัตโนมัติเมื่ออยู่บน dev
        continue-on-error: true

      - name: Install Playwright Browsers
        id: pw_install
        run: npx playwright install --with-deps || echo "Skipping playwright install."

      - name: Full E2E Tests (Playwright)
        id: e2e
        run: |
          npx playwright test || echo "No tests found."

      - name: Final Detailed Job Summary
        if: always()
        env:
          DB: ${{ steps.db.outcome }}
          BASIC: ${{ steps.basic.outcome }}
          INTEG: ${{ steps.integration.outcome }}
          SONAR: ${{ steps.sonar.outcome }}
          CHROM: ${{ steps.chromatic.outcome }}
          E2E: ${{ steps.e2e.outcome }}
        run: |
          get_icon() {
            if [ "$1" == "success" ]; then echo "✅ Passed"
            elif [ "$1" == "failure" ]; then echo "❌ Failed"
            else echo "⏭️ Skipped"
            fi
          }
          
          echo "### 🔬 Stage 2 (Staging) Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "| 🛠️ Step | 📊 Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ Database Staging Migration | $(get_icon $DB) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint & Build | $(get_icon $BASIC) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Full Integration Tests | $(get_icon $INTEG) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ SonarCloud Quality Gate | $(get_icon $SONAR) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Chromatic Baseline Update | $(get_icon $CHROM) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 Full E2E Tests | $(get_icon $E2E) |" >> $GITHUB_STEP_SUMMARY
